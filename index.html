<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Update Notifier</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        darkMode: 'class',
    }
</script>
        <link rel="stylesheet" href="custom.css">
</head>
<body class="bg-gray-100 font-sans dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
<div class="container mx-auto p-4">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-3xl font-bold">RSS Update Notifier</h1>
        <button id="themeToggle" class="p-2 rounded bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 focus:outline-none transition-colors" aria-label="Toggle Dark Mode">
            Dark Mode
        </button>
    </div>

    <!-- Form to add RSS feed -->
    <div class="mb-6">
        <h2 class="text-xl font-semibold mb-2">Add RSS Feed</h2>
        <div class="flex space-x-2">
            <label for="rssUrl" class="sr-only">RSS Feed URL</label>
            <input id="rssUrl" type="text" placeholder="Enter RSS feed URL" class="flex-grow p-2 border rounded dark:bg-gray-800 dark:border-gray-700 dark:text-white">
                <button onclick="addFeed()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-700">Add</button>
        </div>
    </div>

    <!-- Feed list and updates -->
    <div id="feedList" class="mb-6">
        <h2 class="text-xl font-semibold mb-2">Subscribed Feeds</h2>
        <ul id="feeds" class="list-disc pl-5"></ul>
    </div>

    <div id="updates" class="mb-6">
        <h2 class="text-xl font-semibold mb-2">Recent Updates</h2>
        <ul id="updateList" class="space-y-2"></ul>
    </div>

    <!-- Notification area -->
    <div id="notification" class="fixed bottom-4 right-4 bg-green-500 text-white p-4 rounded shadow-lg hidden">
        New updates available!
    </div>
</div>
<p><button onclick="clearSite()" class="text-blue-500 dark:text-blue-400 hover:underline">Reset</button></p>
<script type="module" src="app.js"></script>

</body>
</html>
